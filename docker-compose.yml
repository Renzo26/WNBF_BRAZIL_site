services:
  # Frontend (React/Vite servido por Nginx)
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    expose:
      - "80"

  # Backend (FastAPI — checkout/pagamentos Asaas). Roda migrações no start.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://sandbox.asaas.com/api/v3}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DOC_HASH_KEY: ${DOC_HASH_KEY}
      REDIS_URL: ${REDIS_URL:-}
      SIMULATE_PAYMENT: ${SIMULATE_PAYMENT:-false}
      N8N_CONFIRM_WEBHOOK_URL: ${N8N_CONFIRM_WEBHOOK_URL:-}
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: "8080"
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    expose:
      - "8080"
