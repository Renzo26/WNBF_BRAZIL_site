server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Assets de build com hash: cache eterno.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Mídia estática de public/ (imagens, vídeo, modelo 3D, fontes): cache com revalidação.
    location ~* \.(glb|gltf|woff2?|mp4|webm|webp|png|jpg|jpeg|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Página única: qualquer rota desconhecida cai no index.html.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
